# Workflow de deploy automatico do backend Supabase (migrations + edge
# functions). Atualmente disponivel apenas via execucao manual
# (workflow_dispatch): o gatilho automatico em push para `main` foi removido
# porque este projeto roda no Supabase gerenciado pelo Lovable, e ainda nao
# ha confirmacao de que existe um SUPABASE_ACCESS_TOKEN/SUPABASE_DB_PASSWORD
# com acesso a esse projeto para configurar como secret aqui. Ver
# docs/01-Arquitetura/01-arquitetura-geral.MD (secao "CI/CD: Deploy do
# Supabase") para detalhes. Se/quando esse acesso existir, basta reativar o
# gatilho de push abaixo.
name: Deploy Supabase

on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "supabase/migrations/**"
  #     - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Read project ref from supabase/config.toml
        id: project
        run: |
          REF=$(grep '^project_id' supabase/config.toml | cut -d'"' -f2)
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Link project
        run: supabase link --project-ref "${{ steps.project.outputs.ref }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Detect changed edge functions
        id: functions
        run: |
          CHANGED_PATHS=$(git diff --name-only HEAD~1..HEAD -- supabase/functions/ || true)

          if echo "$CHANGED_PATHS" | grep -q '^supabase/functions/_shared/'; then
            # Código compartilhado mudou: redeploy de todas as functions para
            # garantir que todas peguem a versão atualizada de _shared.
            FUNCTIONS=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name '_shared' -printf '%f\n' | sort)
          else
            FUNCTIONS=$(echo "$CHANGED_PATHS" \
              | awk -F/ 'NF>=3 && $3 != "_shared" {print $3}' \
              | sort -u)
          fi

          echo "$FUNCTIONS" > /tmp/changed-functions.txt
          echo "Functions a deployar:"
          cat /tmp/changed-functions.txt

      - name: Deploy changed edge functions
        run: |
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "Deploying function: $fn"
            supabase functions deploy "$fn" --project-ref "${{ steps.project.outputs.ref }}"
          done < /tmp/changed-functions.txt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
