# Workflow de deploy do backend Supabase (migrations + edge functions).
# Reativado ao migrar do Supabase gerenciado pelo Lovable para o Supabase real
# (projeto ugnrumtngcskbfpwynsr). Roda no push para `main` quando migrations ou
# functions mudam, e por execucao manual. Requer os secrets do repo
# SUPABASE_ACCESS_TOKEN e SUPABASE_DB_PASSWORD. Os secrets de RUNTIME das
# functions (SANTANDER_*, WHATSAPP_*, MAKE_WEBHOOK_SECRET, etc.) sao
# configurados no proprio projeto Supabase (supabase secrets set / dashboard),
# nao aqui. Ver docs/01-Arquitetura/01-arquitetura-geral.MD.
name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
  workflow_dispatch:

# Serializa os deploys: se dois merges caírem próximos, o run mais novo cancela o
# em andamento — evita que um run antigo (checkout velho) termine DEPOIS do novo
# e redeploye todas as functions de um código já superado (rollback silencioso).
concurrency:
  group: supabase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Read project ref from supabase/config.toml
        id: project
        run: |
          REF=$(grep '^project_id' supabase/config.toml | cut -d'"' -f2)
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Link project
        run: supabase link --project-ref "${{ steps.project.outputs.ref }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: List edge functions
        id: functions
        run: |
          # Deploya TODAS as functions (exceto _shared, que e biblioteca
          # importada, nao uma function). Garante que nada fique desatualizado
          # em relacao as migrations recem aplicadas.
          find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name '_shared' -printf '%f\n' \
            | sort > /tmp/functions.txt
          echo "Functions a deployar: $(wc -l < /tmp/functions.txt)"
          cat /tmp/functions.txt

      - name: Deploy edge functions
        run: |
          # Resiliente: tenta TODAS mesmo se uma falhar; falha o job no fim se
          # houver qualquer erro (mas as demais ja terao sido deployadas).
          failed=""
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "::group::Deploying $fn"
            if supabase functions deploy "$fn" --project-ref "${{ steps.project.outputs.ref }}"; then
              echo "OK: $fn"
            else
              echo "::error::Falha ao deployar $fn"
              failed="$failed $fn"
            fi
            echo "::endgroup::"
          done < /tmp/functions.txt
          if [ -n "$failed" ]; then
            echo "::error::Functions com falha:$failed"
            exit 1
          fi
          echo "Todas as functions deployadas com sucesso."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
